name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Format + Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - name: Create .env stub
        run: |
          echo "SUPABASE_URL=https://example.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=stub" >> .env

      - name: Install deps
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Test
        run: flutter test --coverage

      # Eşik kapısı bilinçli olarak yok (küçük suite'te tiyatro olur);
      # rapor artefakt olarak incelemeye açık.
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: coverage/lcov.info
